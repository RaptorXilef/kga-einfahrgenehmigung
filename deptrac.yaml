# @file deptrac.yaml
# @description Erzwingt die architektonische Integrität.

deptrac:
  paths:
    - kga-core/src

  layers:
    - name: Contracts
      collectors:
        - type: directory
          value: kga-core/src/Contracts/.*
    - name: Core
      collectors:
        - type: directory
          value: kga-core/src/Core/.*
    - name: Infrastructure
      collectors:
        - type: directory
          value: kga-core/src/Infrastructure/.*
    - name: Application
      collectors:
        - type: directory
          value: kga-core/src/Application/.*

  ruleset:
    # Contracts sind die Basis und dürfen von NIEMANDEM abhängen
    Contracts: ~

    # Der Core darf nur Contracts kennen (Interfaces)
    Core:
      - Contracts

    # Infrastructure (DB, Mail, etc.) darf Core und Contracts nutzen
    Infrastructure:
      - Core
      - Contracts

    # Die Application-Schicht orchestriert alles
    Application:
      - Core
      - Infrastructure
      - Contracts

# Path: deptrac.yaml
# @description Erzwingt die architektonische Integrität des universellen OOP/DTO Blueprints.

deptrac:
  paths:
    - src
  cache_file: .cache/deptrac/.deptrac.cache

  layers:
    - name: Domain # Reines Datenmodell (Entities, ValueObjects)
      collectors:
        - type: directory
          value: src/Core/Entity/.*
        - type: directory
          value: src/Core/ValueObject/.*

    - name: Contracts # Schnittstellen/Interfaces (z.B. UserRepositoryInterface)
      collectors:
        - type: directory
          value: src/Contracts/.*

    - name: Core # Anwendungsspezifische Logik (Services, Events, DTOs, Utils, Security)
      collectors:
        - type: directory
          value: src/Core/Service/.*
        - type: directory
          value: src/Core/Event/.*
        - type: directory
          value: src/Core/DTO/.*
        - type: directory
          value: src/Core/Utils/.*
        - type: directory
          value: src/Core/Security/.*

    - name: Infrastructure # Externe Implementierungen (MySQL-Repository, Mailer, API-Clients)
      collectors:
        - type: directory
          value: src/Infrastructure/.*

    - name: Application # Einstiegspunkt (Controller/Actions, HTTP, CLI, Middlewares)
      collectors:
        - type: directory
          value: src/Application/.*

    - name: Bootstrap # DI-Container, Configuration, App-Initialisierung
      collectors:
        - type: directory
          value: src/Bootstrap/.*

  ruleset:
    # 1. Domain ist unabhängig von allem.
    Domain: ~

    # 2. Contracts kennen nur die Domain (für Typisierungen).
    Contracts:
      - Domain

    # 3. Core nutzt Contracts und Domain. Hier leben deine DTOs und Services.
    Core:
      - Contracts
      - Domain

    # 4. INFRASTRUKTUR: Kennt KEINEN Core mehr!
    # Sie implementiert nur die Contracts und nutzt Domain-Objekte.
    Infrastructure:
      - Contracts
      - Domain

    # 5. Application nimmt Input an, baut DTOs und schickt sie in den Core.
    Application:
      - Contracts
      - Core
      - Domain
      - Bootstrap

    # 6. Bootstrap darf alles kennen, um die Abhängigkeiten via DI-Container aufzulösen.
    Bootstrap:
      - Application
      - Contracts
      - Core
      - Domain
      - Infrastructure

  # Wir brauchen KEINE Ausnahmen mehr! Das System ist zu 100% sauber entkoppelt.
  # skip_violations: ~

# Path: deptrac.yaml
# @description Erzwingt die architektonische Integrität.

deptrac:
  paths:
    - src
  cache_file: .cache/deptrac/.deptrac.cache

  layers:
    - name: Domain # Die Entitäten sind die Basis
      collectors:
        - type: directory
          value: src/Core/Entity/.*
    - name: Contracts
      collectors:
        - type: directory
          value: src/Contracts/.*
    - name: Core # Jetzt nur noch die Services
      collectors:
        - type: directory
          value: src/Core/Service/.*
    - name: Infrastructure
      collectors:
        - type: directory
          value: src/Infrastructure/.*
    - name: Application # Hier wohnen die Controller
      collectors:
        - type: directory
          value: src/Application/.*

  ruleset:
    # Domain (Permit) ist völlig unabhängig
    Domain: ~

    # Contracts dürfen Domain-Objekte (Permit) kennen
    Contracts:
      - Domain

    # Core nutzt Interfaces und Domain
    Core:
      - Contracts
      - Domain

    # Infrastructure implementiert Interfaces
    Infrastructure:
      - Core
      - Contracts
      - Domain

    # Controller dürfen ALLES nutzen, um den Request zu bedienen
    Application:
      - Core
      - Contracts
      - Domain
      - Infrastructure

  # Hier erlauben wir die explizite Ausnahme für unser System-Tool
  #skip_violations:
  #  App\Core\Service\MigrationService:
  #    - App\Infrastructure\Auth\AuthService
  #    - App\Infrastructure\Storage\JsonStorage
  #    - App\Infrastructure\Storage\MySqlStorage
